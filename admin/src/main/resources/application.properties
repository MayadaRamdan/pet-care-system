server.servlet.context-path=/admin
#database configuration
#spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/petcare
spring.datasource.url=jdbc:mysql://localhost:3306/petneeds?useSSL=false&useUnicode=true&characterEncoding=UTF-8
spring.transaction.default-timeout=9999999
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=catalog
spring.jpa.properties.hibernate.format_sql=true
#Asset configuration
pet.care.asset.dir.base=pet/care/dev/media/
#pet.care.asset.base-url=https://s3.us-east-2.amazonaws.com/pet-care-dev-test/
pet.care.asset.assets.base-url=~/asset/
#virtual threads configuration
spring.threads.virtual.enabled=true
#database pool configuration
spring.datasource.hikari.maximum-pool-size=20
# Elasticsearch Configuration
#elasticsearch.host=elasticsearch
#elasticsearch.port=9200
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.connection-timeout=1
spring.elasticsearch.socket-timeout=30
# Elasticsearch Logging Configuration
logging.level.org.springframework.data.elasticsearch=DEBUG
logging.level.com.petcare.common.elasticsearch=DEBUG